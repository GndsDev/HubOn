spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hubon_db}
spring.datasource.username=${DB_USERNAME:hubon_user}
spring.datasource.password=${DB_PASSWORD:change-me}

spring.jpa.show-sql=true

server.address=${SERVER_ADDRESS:0.0.0.0}

hubon.cors.allowed-origins=${HUBON_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
hubon.security.permit-all=${HUBON_SECURITY_PERMIT_ALL:false}

hubon.seed.enabled=true
hubon.seed.owner.name=${HUBON_SEED_OWNER_NAME:Proprietario}
hubon.seed.owner.email=${HUBON_SEED_OWNER_EMAIL:owner@hubon.local}
hubon.seed.owner.password=${HUBON_SEED_OWNER_PASSWORD:change-me}
hubon.seed.admin.enabled=${HUBON_SEED_ADMIN_ENABLED:true}
hubon.seed.admin.name=${HUBON_SEED_ADMIN_NAME:Administrador}
hubon.seed.admin.email=${HUBON_SEED_ADMIN_EMAIL:admin@hubon.local}
hubon.seed.admin.password=${HUBON_SEED_ADMIN_PASSWORD:change-me}

hubon.jwt.secret=${HUBON_JWT_SECRET:change-me-use-env}
hubon.jwt.expiration-minutes=${HUBON_JWT_EXPIRATION_MINUTES:480}
